name: i18n check

on:
  pull_request:
    paths:
      - 'locales/**'
      - 'i18n-check.mjs'
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate translations against en.json
        run: node i18n-check.mjs locales --block=pt-BR
